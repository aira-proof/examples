<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Company — Agent Monitor (powered by Aira)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'Inter', sans-serif; background: #f8fafc; color: #0f172a; }
    .container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .sub { color: #64748b; font-size: 14px; margin-bottom: 32px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; }
    .stat-value { font-size: 32px; font-weight: 700; }
    .stat-label { font-size: 12px; color: #94a3b8; margin-top: 4px; }
    .section { margin-bottom: 32px; }
    .section-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 600; }
    .badge-green { background: #ecfdf5; color: #059669; }
    .badge-red { background: #fef2f2; color: #dc2626; }
    .badge-gray { background: #f1f5f9; color: #64748b; }
    table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
    th { text-align: left; padding: 10px 16px; font-size: 11px; color: #94a3b8; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
    td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid #f1f5f9; }
    tr:last-child td { border-bottom: none; }
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #64748b; }
    .hash { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #94a3b8; }
    .loading { text-align: center; padding: 40px; color: #94a3b8; }
    .error { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 12px 16px; color: #dc2626; font-size: 13px; margin-bottom: 16px; }
    .config { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-bottom: 24px; }
    .config input { width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; margin-top: 6px; font-family: monospace; }
    .config label { font-size: 12px; color: #64748b; font-weight: 500; }
    .config button { margin-top: 12px; padding: 8px 20px; background: #0f172a; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .config button:hover { background: #1e293b; }
    .powered { text-align: center; margin-top: 40px; font-size: 11px; color: #cbd5e1; }
    .powered a { color: #94a3b8; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Agent Monitor</h1>
    <p class="sub">Real-time view of AI agent actions — powered by Aira API</p>

    <!-- Config -->
    <div class="config" id="config">
      <label>Aira API Key</label>
      <input type="password" id="apiKey" placeholder="aira_live_..." />
      <label style="margin-top: 12px; display: block;">API Base URL</label>
      <input type="text" id="baseUrl" value="http://localhost:8001" />
      <button onclick="loadDashboard()">Connect</button>
    </div>

    <div id="dashboard" style="display: none;">
      <!-- Stats -->
      <div class="grid" id="stats"></div>

      <!-- Agents -->
      <div class="section">
        <div class="section-title">Registered Agents</div>
        <div id="agents"><div class="loading">Loading...</div></div>
      </div>

      <!-- Recent Actions -->
      <div class="section">
        <div class="section-title">Recent Actions</div>
        <div id="actions"><div class="loading">Loading...</div></div>
      </div>

      <!-- Evidence -->
      <div class="section">
        <div class="section-title">Evidence Packages</div>
        <div id="evidence"><div class="loading">Loading...</div></div>
      </div>
    </div>

    <div class="powered">Cryptographic audit trail by <a href="https://airaproof.com">Aira</a></div>
  </div>

  <script>
    let API_KEY = "";
    let BASE = "";

    async function api(path) {
      const res = await fetch(`${BASE}/api/v1${path}`, {
        headers: { Authorization: `Bearer ${API_KEY}` },
      });
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      return res.json();
    }

    function badge(text, type) {
      return `<span class="badge badge-${type}">${text}</span>`;
    }

    function truncate(s, n = 12) {
      return s && s.length > n ? s.slice(0, n) + "..." : s || "—";
    }

    function timeAgo(iso) {
      const d = new Date(iso);
      const now = new Date();
      const mins = Math.floor((now - d) / 60000);
      if (mins < 1) return "just now";
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      return `${Math.floor(hrs / 24)}d ago`;
    }

    async function loadDashboard() {
      API_KEY = document.getElementById("apiKey").value;
      BASE = document.getElementById("baseUrl").value.replace(/\/$/, "");

      if (!API_KEY) return alert("Enter your API key");

      document.getElementById("config").style.display = "none";
      document.getElementById("dashboard").style.display = "block";

      try {
        // Load all data in parallel
        const [actions, agents, evidence, usage] = await Promise.all([
          api("/actions?per_page=10"),
          api("/agents?per_page=20"),
          api("/evidence/packages?per_page=5"),
          api("/usage"),
        ]);

        // Stats
        const totalActions = actions.pagination.total;
        const totalAgents = agents.pagination.total;
        const activeAgents = agents.data.filter(a => a.status === "active").length;

        document.getElementById("stats").innerHTML = `
          <div class="stat">
            <div class="stat-value">${totalActions}</div>
            <div class="stat-label">Notarized actions</div>
          </div>
          <div class="stat">
            <div class="stat-value">${totalAgents}</div>
            <div class="stat-label">Registered agents</div>
          </div>
          <div class="stat">
            <div class="stat-value">${activeAgents}</div>
            <div class="stat-label">Active agents</div>
          </div>
          <div class="stat">
            <div class="stat-value">${usage.usage} / ${usage.limit === -1 ? "∞" : usage.limit}</div>
            <div class="stat-label">Operations this month (${usage.plan})</div>
          </div>
        `;

        // Agents table
        if (agents.data.length === 0) {
          document.getElementById("agents").innerHTML = '<p style="color:#94a3b8;font-size:13px;">No agents registered yet.</p>';
        } else {
          document.getElementById("agents").innerHTML = `
            <table>
              <thead><tr><th>Slug</th><th>Name</th><th>Status</th><th>Public</th><th>Registered</th></tr></thead>
              <tbody>
                ${agents.data.map(a => `
                  <tr>
                    <td class="mono">${a.agent_slug}</td>
                    <td>${a.display_name}</td>
                    <td>${badge(a.status, a.status === "active" ? "green" : "red")}</td>
                    <td>${a.public ? "Yes" : "—"}</td>
                    <td class="mono">${timeAgo(a.registered_at)}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          `;
        }

        // Actions table
        if (actions.data.length === 0) {
          document.getElementById("actions").innerHTML = '<p style="color:#94a3b8;font-size:13px;">No actions yet.</p>';
        } else {
          document.getElementById("actions").innerHTML = `
            <table>
              <thead><tr><th>Type</th><th>Agent</th><th>Status</th><th>Hold</th><th>When</th></tr></thead>
              <tbody>
                ${actions.data.map(a => `
                  <tr>
                    <td>${badge(a.action_type, "gray")}</td>
                    <td class="mono">${a.agent_id || "—"}</td>
                    <td>${badge(a.status, "green")}</td>
                    <td>${a.legal_hold ? "🔒" : ""}</td>
                    <td class="mono">${timeAgo(a.created_at)}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          `;
        }

        // Evidence table
        if (evidence.data.length === 0) {
          document.getElementById("evidence").innerHTML = '<p style="color:#94a3b8;font-size:13px;">No evidence packages yet.</p>';
        } else {
          document.getElementById("evidence").innerHTML = `
            <table>
              <thead><tr><th>Title</th><th>Actions</th><th>Status</th><th>Created</th></tr></thead>
              <tbody>
                ${evidence.data.map(p => `
                  <tr>
                    <td>${p.title}</td>
                    <td>${p.action_count}</td>
                    <td>${badge(p.status, "green")}</td>
                    <td class="mono">${timeAgo(p.created_at)}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          `;
        }

      } catch (err) {
        document.getElementById("dashboard").innerHTML = `
          <div class="error">Failed to connect: ${err.message}</div>
          <button onclick="location.reload()" style="padding:8px 16px;border:1px solid #e2e8f0;border-radius:8px;background:white;cursor:pointer;font-size:13px;">Try again</button>
        `;
      }
    }
  </script>
</body>
</html>
